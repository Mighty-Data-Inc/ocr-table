[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mightydatainc-ocr-table"
version = "1.0.0"
description = "Extract structured table data from PDFs, PNGs, etc., using LLM vision models"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "python-dotenv>=1.0.1",
  "openai>=2.24.0",
  "mightydatainc-gpt-conversation>=1.3.2"
]
authors = [{ name = "Mikhail Voloshin" }]
license = { file = "LICENSE" }

[tool.hatch.build.targets.wheel]
packages = ["src/mightydatainc_ocr_table"]

[tool.pytest.ini_options]
pythonpath = ["src"]
